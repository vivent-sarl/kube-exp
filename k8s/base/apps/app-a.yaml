apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-a
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-a
  template:
    metadata:
      labels:
        app: app-a
    spec:
      nodeSelector:
        eks.amazonaws.com/nodegroup: demo
      containers:
      - name: app
        image: hashicorp/http-echo
        args: ["-text=app-a response", "-listen=:8080"]
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "100Mi"
            cpu: "30m"
          limits:
            memory: "300Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: app-a-service
  namespace: demo
spec:
  selector:
    app: app-a
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080